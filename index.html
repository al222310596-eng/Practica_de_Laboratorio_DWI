<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practica DWI Hugo Erick Garcia Nava</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Practica de Laboratorio DWI de Hugo Erick Garcia Nava</h1>
        </header>

        <!-- Menú de Navegación -->
        <nav class="main-nav">
            <button class="nav-btn active" data-tool="tool1">
                <span class="icon"></span> Calculadora de Edad
            </button>
            <button class="nav-btn" data-tool="tool2">
                <span class="icon"></span> Conversor Térmico
            </button>
            <button class="nav-btn" data-tool="tool3">
                <span class="icon"></span> Gestor de Tareas
            </button>
        </nav>

        <!-- Contenedor de Herramientas -->
        <main class="tools-container">
            <!-- Herramienta 1: Calculadora de Edad -->
            <section id="tool1" class="tool-section active">
                <div class="tool-header">
                    <h2>Proyecto de clase No. 1</h2>
                    <span class="badge">Calculadora de Edad</span>
                </div>                
                <form id="formularioEdad" class="tool-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="dia">Día</label>
                            <input type="number" id="dia" min="1" max="31" placeholder="1-31" required>
                        </div>
                        <div class="form-group">
                            <label for="mes">Mes</label>
                            <input type="number" id="mes" min="1" max="12" placeholder="1-12" required>
                        </div>
                        <div class="form-group">
                            <label for="anio">Año</label>
                            <input type="number" id="anio" min="1900" max="2026" placeholder="YYYY" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">Calcular Edad</button>
                </form>

                <div id="resultadoEdad" class="result-container"></div>
            </section>

            <!-- Herramienta 2: Conversor Térmico -->
            <section id="tool2" class="tool-section">
                <div class="tool-header">
                    <h2>Proyecto de clase No. 2</h2>
                    <span class="badge">Conversor Térmico</span>
                </div>
                <form id="formularioConversor" class="tool-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="valorTemp">Valor numérico</label>
                            <input type="number" id="valorTemp" placeholder="Ingresa el valor" step="any" required>
                        </div>
                        <div class="form-group">
                            <label for="unidadOrigen">Unidad de origen</label>
                            <select id="unidadOrigen" required>
                                <option value="">Selecciona...</option>
                                <option value="C">Celsius (°C)</option>
                                <option value="F">Fahrenheit (°F)</option>
                                <option value="K">Kelvin (K)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="unidadDestino">Unidad de destino</label>
                            <select id="unidadDestino" required>
                                <option value="">Selecciona...</option>
                                <option value="C">Celsius (°C)</option>
                                <option value="F">Fahrenheit (°F)</option>
                                <option value="K">Kelvin (K)</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary" id="btnConvertir" disabled>Convertir</button>
                </form>

                <div id="resultadoConversion" class="result-container"></div>
            </section>

            <!-- Herramienta 3: Gestor de Tareas -->
            <section id="tool3" class="tool-section">
                <div class="tool-header">
                    <h2>Proyecto de clase No. 3</h2>
                    <span class="badge">Gestor de Tareas</span>
                </div>
                <form id="formularioTareas" class="tool-form">
                    <div class="form-row" style="flex: 1;">
                        <div class="form-group" style="flex: 1;">
                            <label for="inputTarea">Nueva tarea</label>
                            <input type="text" id="inputTarea" placeholder="Escribe una nueva tarea..." required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">Agregar Tarea</button>
                </form>

                <div id="listaTareas" class="task-list"></div>
                <div class="task-stats">
                    <div class="stat-item">
                        <span class="stat-label">Total:</span>
                        <strong id="totalTareas" class="stat-value">0</strong>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Pendientes:</span>
                        <strong id="tareasPendientes" class="stat-value">0</strong>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Completadas:</span>
                        <strong id="tareasCompletadas" class="stat-value">0</strong>
                    </div>
                </div>
            </section>
        </main>

        <footer>
            <p>Práctica DWI por Hugo Erick</p>
        </footer>
    </div>

    <script src="js/navegacion.js"></script>
    <script src="js/calculadora-edad.js"></script>
    <script src="js/conversor-termico.js"></script>
    <script src="js/gestor-tareas.js"></script>
</body>
</html>
